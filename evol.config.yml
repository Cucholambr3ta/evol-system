evol_version: 0.1.0-dev
mempalace:
  enabled: true
  mode: cli
  default_wing: evol-dd
  index_paths:
    - .agent
    - .evol
    - docs
    - prompts
    - scripts
    - templates
    - schemas
    - CLAUDE.md
    - README.md
    - memoria.md
    - lecciones.md
  triggers:
    - session_start
    - file_write
    - git_commit
  debounce_seconds: 5
pipeline:
  gates:
    - enforce_artifacts
    - require_approval
    - require_signature
    - block_on_missing_spec
  phases:
    - briefing
    - spec
    - plan
    - build
    - qa
    - retro
agents:
  registry: prompts/agents/registry.json
  max_concurrent: 5
  fallback_strategy: escalate_to_orchestrator
  orchestration_pattern: lead_plus_specialists
  ephemeral:
    default_expires_after_days: 30
    retire_on_task_complete: false
    archive_path: .evol/agents/retired
gitnexus:
  enabled: false
  license: PolyForm-NC
  commercial_use: false
ide_adapters:
  generate_for:
    - claude-code
    - opencode
  mcp: false