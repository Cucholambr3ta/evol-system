name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run pytest
        run: pytest tests/ -v

  shell-tests:
    name: Shell Tests (Bats)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            git clone https://github.com/bats-core/bats-core.git
            cd bats-core
            ./install.sh /usr/local
            cd ..
            rm -rf bats-core
          fi

      - name: Run Bats tests
        run: bats tests/*.bats

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Anti-MCP check
        run: |
          echo "=== Anti-MCP Check ==="
          PATTERNS="mcpServers|xdd-mcp-server|evol-mcp-server"
          count=$(grep -rEl "$PATTERNS" .agent/ .claude/ .opencode/ 2>/dev/null | grep -vE "\.github/workflows/ci\.yml$" | wc -l)
          echo "MCP references: $count"
          if [ "$count" -gt 0 ]; then
            echo "FAIL: MCP detected"
            grep -rEl "$PATTERNS" .agent/ .claude/ .opencode/ 2>/dev/null | grep -vE "\.github/workflows/ci\.yml$"
            exit 1
          fi
          echo "OK: 0 MCP references"

      - name: Registry validation
        run: python3 scripts/validate-registry.py --strict

      - name: Shield audit
        run: python3 scripts/evol-shield.py audit --ci --no-write

  packaging:
    name: Packaging & Entrypoints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Version check
        run: evol --version

      - name: Smoke test entrypoints
        run: |
          for cmd in evol-gate evol-eval evol-flow evol-provider evol-shield evol-orchestrate evol-agent evol-evolve evol-research evol-memory evol-lessons; do
            echo "Testing: $cmd"
            "$cmd" --help >/dev/null 2>&1 && echo "  OK" || { echo "  FAIL: $cmd"; exit 1; }
          done

  bootstrap:
    name: Bootstrap & Init
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List profiles
        run: bash scripts/evol-init.sh --list-profiles

      - name: Doctor check
        run: bash scripts/evol-doctor.sh

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint workflows
        run: bash scripts/lint-workflows.sh

  evals:
    name: Eval Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate eval suites
        run: python3 scripts/evol-eval.py validate --all 2>/dev/null || true

      - name: Check eval structure
        run: |
          if [ -d evals ] && [ -n "$(ls -A evals 2>/dev/null)" ]; then
            for suite in evals/*/; do
              if [ -f "${suite}grader.yaml" ]; then
                echo "Suite: $suite"
              fi
            done
          else
            echo "No eval suites found - skipping"
          fi