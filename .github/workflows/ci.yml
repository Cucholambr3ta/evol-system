name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run pytest
        run: pytest tests/ -v

  shell-tests:
    name: Shell Tests (Bats)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            git clone https://github.com/bats-core/bats-core.git
            cd bats-core
            ./install.sh /usr/local
            cd ..
            rm -rf bats-core
          fi

      - name: Run Bats tests
        run: bats tests/*.bats

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Anti-MCP check
        run: |
          echo "=== Anti-MCP Check ==="
          PATTERNS="mcpServers|xdd-mcp-server|evol-mcp-server"
          count=$(grep -rEl "$PATTERNS" .agent/ .claude/ .opencode/ 2>/dev/null | grep -vE "\.github/workflows/ci\.yml$" | wc -l)
          echo "MCP references: $count"
          if [ "$count" -gt 0 ]; then
            echo "FAIL: MCP detected"
            grep -rEl "$PATTERNS" .agent/ .claude/ .opencode/ 2>/dev/null | grep -vE "\.github/workflows/ci\.yml$"
            exit 1
          fi
          echo "OK: 0 MCP references"

      - name: Registry validation
        run: python3 scripts/validate-registry.py --strict

      - name: Check equipo sync
        run: |
          echo "=== Checking equipo.md sync ==="
          cp docs/equipo.md docs/equipo.md.saved
          bash scripts/generate-equipo.sh > /dev/null 2>&1
          if ! diff -q docs/equipo.md docs/equipo.md.saved > /dev/null 2>&1; then
            echo "FAIL: docs/equipo.md is out of sync with registry.json"
            echo "Run 'bash scripts/generate-equipo.sh' to regenerate"
            diff docs/equipo.md docs/equipo.md.saved || true
            mv docs/equipo.md.saved docs/equipo.md
            exit 1
          fi
          rm -f docs/equipo.md.saved
          echo "OK: docs/equipo.md is in sync"

      - name: Shield audit
        run: python3 scripts/evol-shield.py audit --ci --no-write

  packaging:
    name: Packaging & Entrypoints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Version check
        run: evol --version

      - name: Smoke test entrypoints
        run: |
          for cmd in evol-gate evol-eval evol-flow evol-provider evol-shield evol-orchestrate evol-agent evol-evolve evol-research evol-memory evol-lessons; do
            echo "Testing: $cmd"
            "$cmd" --help >/dev/null 2>&1 && echo "  OK" || { echo "  FAIL: $cmd"; exit 1; }
          done

  bootstrap:
    name: Bootstrap & Init
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List profiles
        run: bash scripts/evol-init.sh --list-profiles

      - name: Doctor check
        run: bash scripts/evol-doctor.sh

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint workflows
        run: bash scripts/lint-workflows.sh

  evals:
    name: Eval Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate eval suites
        run: python3 scripts/evol-eval.py validate --all

      - name: Run structural evals
        run: |
          echo "=== Running Eval Suites ==="
          python3 scripts/evol-eval.py run --all
          exit_code=$?
          echo "Eval exit code: $exit_code"

      - name: Upload report
        if: always()
        run: |
          if [ -f .evol/reports/latest.json ]; then
            echo "=== Eval Report ==="
            python3 scripts/evol-eval.py report
          fi

      - name: Fail on eval failure
        run: |
          if [ ! -f .evol/reports/latest.json ]; then
            echo "FAIL: No eval report generated"
            exit 1
          fi
          passed=$(python3 -c "import json; r=json.load(open('.evol/reports/latest.json')); print(int(r.get('overall_passed', False)))")
          if [ "$passed" -eq 0 ]; then
            echo "FAIL: Evals did not pass quality gate"
            exit 1
          fi
          echo "OK: All eval suites passed"